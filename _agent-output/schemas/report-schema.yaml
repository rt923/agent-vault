# 报告类产出元数据模板
# 复制此文件并填写字段，与产出文件一同上传

agent_name: ""              # 必填：来源智能体名称
agent_type: "report"        # 智能体类型
created: ""                 # 必填：产出时间 (ISO 8601)
source_session: ""          # 来源会话ID
file_type: "report"         # 文件类型
tags: []                    # 标签列表
confidence: 0.0             # 置信度 (0-1)
task_id: ""                 # 关联任务ID
description: ""             # 必填：产出描述
report_type: ""             # 报告类型 (analysis/weekly/daily/research)
data_sources: []            # 数据来源
conclusion: ""              # 核心结论